name: Daily Solidity Lessons

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run lesson bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lesson_bot_free.py

      - name: Persist topic progress
        run: |
          git config user.name "lesson-bot"
          git config user.email "lesson-bot@users.noreply.github.com"
          git add topic_index.json
          git diff --staged --quiet || git commit -m "Update topic index [skip ci]"
          git push
