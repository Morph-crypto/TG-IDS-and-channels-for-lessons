name: Daily Solidity Lessons

on:
  schedule:
    # Times are in UTC. GMT+3 minus 3 hours = UTC.
    # 10:00 GMT+3 -> 07:00 UTC
    # 14:00 GMT+3 -> 11:00 UTC
    # 17:00 GMT+3 -> 14:00 UTC
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: {} # lets you manually trigger a run from the Actions tab to test

permissions:
  contents: write

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run lesson bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lesson_bot_free.py

      # Commit the updated topic index (so tomorrow picks up where today
      # left off) and lessons.json (in case a new lesson was auto-generated).
      - name: Persist progress and any new lessons
        run: |
          git config user.name "lesson-bot"
          git config user.email "lesson-bot@users.noreply.github.com"
          git add topic_index.json lessons.json
          git diff --staged --quiet || git commit -m "Update topic index / add generated lesson [skip ci]"
          git push
